# ─── Single Server Configuration (backward compatible) ───
# Use "connection" (singular) for a single server setup.

connection:
  host: localhost
  port: 1433
  database: MyDatabase
  authentication:
    type: sql          # sql | windows | azure-ad

    # --- SQL Authentication ---
    user: sa
    password: YourPassword123

    # --- Windows Authentication (NTLM) ---
    # type: windows
    # user: MyUser
    # password: MyPassword
    # domain: MYDOMAIN        # optional

    # --- Windows Authentication (SSPI / Integrated Security) ---
    # type: windows            # no user/password needed
    #                          # requires: npm install msnodesqlv8

    # --- Azure AD ---
    # type: azure-ad
    # clientId: xxx
    # clientSecret: xxx
    # tenantId: xxx
  encrypt: false
  trustServerCertificate: true
  connectionTimeout: 15000
  requestTimeout: 30000
  pool:
    min: 0
    max: 10
    idleTimeout: 30000

security:
  mode: readonly       # readonly | readwrite | admin
  allowedDatabases: [] # empty = all allowed
  blockedDatabases:
    - master
    - msdb
    - tempdb
    - model
  allowedSchemas: []   # empty = all allowed
  blockedSchemas: []
  maxRowCount: 1000
  queryTimeout: 30000
  allowDDL: false
  allowMutations: false
  blockedKeywords:
    - xp_cmdshell
    - SHUTDOWN
    - DROP DATABASE
    - RECONFIGURE
    - sp_configure
  maskColumns:
    - pattern: "*.password"
      mask: "***"
    - pattern: "*.ssn"
      mask: "XXX-XX-XXXX"


# ─── Multi-Server Configuration ───
# Use "connections" (plural) to define multiple named servers.
# Uncomment the block below and remove/comment the single "connection" block above.
#
# defaultServer: dev
#
# connections:
#   dev:
#     host: dev-server.example.com
#     port: 1433
#     database: MyDatabase
#     authentication:
#       type: sql
#       user: sa
#       password: DevPass123
#     trustServerCertificate: true
#     security:                    # per-server security override
#       mode: admin
#       maxRowCount: 5000
#
#   staging:
#     host: staging-server.example.com
#     port: 1433
#     database: MyDatabase
#     authentication:
#       type: windows
#       user: StagingUser
#       password: StagingPass
#       domain: CORP
#     security:
#       mode: readwrite
#
#   prod:
#     host: prod-server.example.com
#     database: MyDatabase
#     authentication:
#       type: sql
#       user: readonly_user
#       password: ProdReadOnly
#     security:
#       mode: readonly
#       maxRowCount: 500
#       blockedDatabases:
#         - master
#         - msdb
#         - tempdb
#         - model
#
# # Global security defaults (applied to all servers, overridden per-server)
# security:
#   maxRowCount: 1000
#   blockedKeywords:
#     - xp_cmdshell
#     - SHUTDOWN
#     - DROP DATABASE
#     - RECONFIGURE
#     - sp_configure
#   maskColumns:
#     - pattern: "*.password"
#       mask: "***"
